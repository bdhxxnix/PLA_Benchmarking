exp_name: exp_ODA
# OD-A: Disk PLA-only — iso-ε and iso-Rp baseline
# Goal: map ε → expected pages/query (Rp) for all three PLA algorithms.
#        Establishes the "ε → I/O cost" curve before any index-level experiment.
#
# Two analysis axes:
#   1. iso-ε: fix ε, compare Rp across PLA algorithms
#   2. iso-Rp: find ε that achieves Rp ∈ {1, 2, 4, 8, 16} and compare seg_cnt
#
# For iso-Rp mode, --target-rp drives epsilon search in ondisk_bench.
# For iso-ε mode, --target-rp 0 (default).
#
# Metrics: seg_cnt, bytes_index, io_pages_mean, io_pages_p50/p95/p99, build_ms.
#
# Key observations:
#   - ε ∝ 1/Rp (larger ε → narrower prediction → fewer pages needed)
#   - Optimal produces fewer segments for same Rp vs Greedy/Swing
#   - For iso-Rp, Greedy/Swing need larger ε (bigger index) to match Optimal's Rp

matrix:
  scenario:       [ondisk]
  pla:            [optimal, swing, greedy]
  epsilon:        [16, 32, 64, 128, 256, 512, 1024]
  threads:        [1]
  dataset:        [synth_uniform_1M, synth_lognormal_1M]
  workload:       [readonly]
  fetch_strategy: [1]
  granularity:    [item]
  page_align:     [false]

n_keys:  1000000
queries: 100000

extra_flags: {}
